spring:
  application:
    name: sangue-amigo

  datasource:
    url: jdbc:postgresql://localhost:5432/sangueamigo
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:ChaveSecretaGenericaDeTestesParaGeracaoDeTokensJWT2026!}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  admin:
    email: ${ADMIN_EMAIL:admin@sangueamigo.local}
    password: ${ADMIN_PASSWORD:Admin123!}
    name: ${ADMIN_NAME:Administrador}
    role-name: ${ADMIN_ROLE_NAME:Gestor}
    phone: ${ADMIN_PHONE:}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
