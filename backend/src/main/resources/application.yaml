spring:
  application:
    name: sangue-amigo

  datasource:
    url: jdbc:postgresql://localhost:5432/sangueamigo
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:ChaveSecretaGenericaDeTestesParaGeracaoDeTokensJWT2026!}
  expiration: 86400000
  refresh-expiration: 604800000
